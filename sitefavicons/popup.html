<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Site Favicons</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="hdr">
    <img src="icons/icon32.png" alt="" width="18" height="18">
    <span>Site Favicons</span>
  </header>

  <div class="site">
    <div class="site-head">
      <img id="curfav" class="curfav" alt="">
      <div class="site-id">
        <div id="host" class="host">--</div>
        <div class="muted">this site's current icon</div>
      </div>
    </div>

    <div id="unsupported" class="note" hidden>
      Custom favicons only work on normal <code>http</code> / <code>https</code> pages.
    </div>

    <div id="editor" class="editor">
      <div class="preview-wrap">
        <img id="preview" class="preview" alt="">
        <span class="muted">preview</span>
      </div>
      <div class="controls">
        <label class="ctl">
          <span>Emoji</span>
          <input id="emoji" type="text" maxlength="8" spellcheck="false" placeholder="e.g. 🚀">
        </label>
        <div class="ctl" id="fileRow">
          <span>Image file</span>
          <input id="file" type="file"
                 accept="image/*,.png,.jpg,.jpeg,.webp,.avif,.gif,.svg,.bmp,.ico">
          <button id="openEditor" class="btn ghost" type="button">Choose image...</button>
        </div>
        <label class="ctl">
          <span>Image URL</span>
          <input id="url" type="text" spellcheck="false" placeholder="https://...">
        </label>
        <button id="letter" class="btn ghost" type="button">Use a colored letter</button>
      </div>
      <div class="actions">
        <button id="save" class="btn primary" type="button" disabled>Save for this site</button>
        <button id="remove" class="btn ghost" type="button" hidden>Remove</button>
      </div>
    </div>
  </div>

  <div class="list-head">All custom favicons</div>
  <div id="list" class="list"></div>

  <script src="popup.js"></script>
</body>
</html>
