<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split Screen</title>
  <link rel="stylesheet" href="split.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon32.png" alt="" width="20" height="20">
      <span>Split Screen</span>
    </div>
    <div class="spacer"></div>
    <button id="toggleDir" class="tbtn" title="Switch between side-by-side and stacked">Layout: Side by side</button>
    <button id="addPane" class="tbtn" title="Add another pane">+ Pane</button>
  </header>

  <div class="panes row" id="panes"></div>

  <script src="split.js"></script>
</body>
</html>
