<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Split Screen</title>
  <link id="favicon" rel="icon" href="icons/icon32.png">
  <link rel="stylesheet" href="split.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icons/icon32.png" alt="" width="20" height="20">
      <span>Split Screen</span>
    </div>

    <div class="tb-group">
      <button id="gridBtn" class="tbtn" title="Choose a grid layout">▦ Grid: <span id="gridLabel">2 × 1</span></button>
      <button id="addPane" class="tbtn" title="Add a pane">+ Pane</button>
      <div id="gridPicker" class="grid-picker" hidden></div>
    </div>

    <div class="spacer"></div>

    <input id="setIcon" class="icon-input" type="text" maxlength="4" spellcheck="false"
           placeholder="🙂" title="Give this set its own tab icon -- paste any emoji (blank = use the first pane's favicon)">
    <input id="setName" class="name-input" type="text" spellcheck="false" placeholder="Name this set">
    <button id="saveSet" class="tbtn" title="Pin this layout to the bar below">★ Save</button>
    <button id="copyLink" class="tbtn" title="Copy a bookmarkable link to this set">🔖 Copy link</button>
  </header>

  <div class="bookmarks" id="bookmarks"></div>

  <div class="panes" id="panes"></div>

  <script src="split.js"></script>
</body>
</html>
